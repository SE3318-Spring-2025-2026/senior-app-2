openapi: 3.0.3
info:
  title: AI-Powered Developer Performance Audit System
  version: 1.2.0
  description: >
    This API implements the data flow for an automated developer auditing system. 
    It manages the lifecycle from raw data ingestion (GitHub/JIRA) to AI-driven 
    validation and final grading assessments.
  contact:
    name: Development Team
    email: dev-support@audit-system.io

servers:
  - url: https://api.devaudit-system.io/v1
    description: Production Environment

tags:
  - name: "Ingestion & Sync (5.1 - 5.2)"
    description: "External API integrations and data pre-processing"
  - name: "AI Analytics (5.3)"
    description: "AI-driven validation and discrepancy detection"
  - name: "Reporting & Grading (5.4 - 4.0)"
    description: "Generation of audit logs and final performance summaries"

paths:
  # Process 5.1 & 5.2: Auth, Fetching, and Pre-processing
  /ingestion/sync:
    post:
      tags: ["Ingestion & Sync (5.1 - 5.2)"]
      summary: "Initiate Data Ingestion and Pre-processing"
      description: "Triggers Process 5.1 (Auth & Data Fetching) using tokens from D2 and flows into Process 5.2 (Pre-processing) to clean unstructured logs."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SyncRequest'
      responses:
        '202':
          description: "Sync job accepted and processing started"
        '401':
          description: "Unauthorized - Integration tokens missing or expired"

  /ingestion/status/{jobId}:
    get:
      tags: ["Ingestion & Sync (5.1 - 5.2)"]
      summary: "Monitor Sync Status"
      description: "Tracks the transition from Unstructured Logs (5.1) to Structured Dev Activity (5.2)."
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: "Current status of the ingestion job"

  # Process 5.3: AI Analysis & Validator
  /analysis/validate:
    post:
      tags: ["AI Analytics (5.3)"]
      summary: "Execute AI Validation Pipeline"
      description: "Analyzes Structured Dev Activity to detect discrepancies and generate validation metrics as per Process 5.3."
      responses:
        '200':
          description: "Analysis complete"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisResults'

  # Process 5.4 & Data Store D6: Log Generation and Results
  /audit/results:
    get:
      tags: ["Reporting & Grading (5.4 - 4.0)"]
      summary: "Fetch AI Audit Logs"
      description: "Retrieves Audit Logs and Performance Reports stored in Data Store D6, generated by Process 5.4."
      parameters:
        - name: groupId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: "List of audit results retrieved from D6"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditResult'

  # Process 4.0: Grading & Assessment
  /grading/summary:
    get:
      tags: ["Reporting & Grading (5.4 - 4.0)"]
      summary: "Get Final Grading & Assessment Summary"
      description: "Returns the Validation Summary which feeds into the final 4.0 Grading Process."
      responses:
        '200':
          description: "Aggregated performance assessment"

components:
  schemas:
    SyncRequest:
      type: object
      required: [source, groupId]
      properties:
        source:
          type: string
          enum: [github, jira, both]
        groupId:
          type: string
          example: "D2-GROUP-01"
        integrationTokens:
          type: object
          properties:
            pat: { type: string }
            oauth: { type: string }

    AnalysisResults:
      type: object
      properties:
        status: { type: string }
        discrepanciesDetected: { type: integer }
        metrics:
          type: object
          properties:
            accuracy: { type: number }
            completeness: { type: number }

    AuditResult:
      type: object
      properties:
        id: { type: string, format: uuid }
        devIdentity: { type: string }
        performanceScore: { type: number }
        auditTimestamp: { type: string, format: date-time }
        reportUrl: { type: string }

  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-KEY
