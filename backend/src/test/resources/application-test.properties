spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

app.jwt.secret=test_secret_key_that_is_at_least_256_bits_long_for_hmac_sha
app.jwt.expiration-ms=3600000
app.cors.allowed-origins=http://localhost:5173

github.client.id=test-github-client-id
github.client.secret=test-github-client-secret
github.redirect.uri=http://localhost:5173/auth/github/callback

spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=test
spring.mail.password=test
