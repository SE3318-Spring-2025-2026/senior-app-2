spring.application.name=senior-app
server.port=8080

# MySQL (override: MYSQL_PORT, MYSQL_USER, MYSQL_PASSWORD)
spring.datasource.url=jdbc:mysql://localhost:${MYSQL_PORT:3333}/seniorapp?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
app.jwt.secret=CHANGE_ME_IN_PRODUCTION_use_a_long_random_secret_key_at_least_256_bits
app.jwt.expiration-ms=86400000

# CORS
app.cors.allowed-origins=http://localhost:5173

# Email Sending Configurations
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=seniorapp2test@gmail.com
spring.mail.password=grisjtaqbmjwyfiy
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# GitHub OAuth
github.client.id=${GITHUB_CLIENT_ID:placeholder}
# Must match the "Authorization callback URL" in the GitHub OAuth app (Vite dev server).
github.redirect.uri=http://localhost:5173/auth/github/callback
github.client.secret=${GITHUB_CLIENT_SECRET:placeholder}
