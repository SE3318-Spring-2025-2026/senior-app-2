spring.application.name=senior-app
server.port=8080

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/seniorapp?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=12345678
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
app.jwt.secret=CHANGE_ME_IN_PRODUCTION_use_a_long_random_secret_key_at_least_256_bits
app.jwt.expiration-ms=86400000

# CORS
app.cors.allowed-origins=http://localhost:5173
